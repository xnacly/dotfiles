[main]
font=Maple Mono NF:size=14
use-bold=no
dpi-aware=auto
prompt="$ "
placeholder=run command
terminal=ghostty -e {cmd}
fields=filename,name,generic,exec,categories,keywords,comment
match-mode=fzf
sort-result=yes
match-counter=yes
show-actions=yes
icons-enabled=yes
icon-theme=pixora
anchor=center
width=52
lines=12
tabs=4
horizontal-pad=16
vertical-pad=10
inner-pad=6
line-height=22
layer=overlay

[colors]
background=e8e3d6f2
text=4c4f69ff
prompt=877d70ff
placeholder=877d70ff
input=4c4f69ff
match=1e66f5ff
selection=c8bfadff
selection-text=4c4f69ff
selection-match=1e66f5ff
counter=877d70ff
border=b2a792ff

[border]
width=2
radius=0
selection-radius=0
